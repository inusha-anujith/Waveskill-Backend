services:
  mongo:
    image: mongo:7
    container_name: waveskill-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: waveskill
      MONGO_INITDB_ROOT_PASSWORD: waveskill
      MONGO_INITDB_DATABASE: waveskill_hr
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
